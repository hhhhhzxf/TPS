server:
  port: 8080

spring:
  datasource:
    url: ${TPS_DEV_DB_URL:jdbc:h2:mem:tps;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${TPS_DEV_DB_USERNAME:sa}
    password: ${TPS_DEV_DB_PASSWORD:}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  public-base-url: ${TPS_PUBLIC_BASE_URL:http://172.168.10.204:8080}

logging:
  level:
    com.tps: DEBUG
