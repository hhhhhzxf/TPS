# 配置说明：开发环境配置文件，负责覆盖本地调试时的开发参数。

server:
  port: 8080

spring:
  datasource:
    url: ${TPS_DEV_DB_URL:jdbc:h2:mem:tps;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${TPS_DEV_DB_USERNAME:sa}
    password: ${TPS_DEV_DB_PASSWORD:}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: false

app:
  public-base-url: ${TPS_PUBLIC_BASE_URL:http://127.0.0.1:8080}

logging:
  pattern:
    level: "requestId:%X{requestId} %5p"
  level:
    com.tps: DEBUG
