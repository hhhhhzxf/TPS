# 配置说明：后端公共配置文件，负责数据库、JWT、文件上传和接口文档等基础参数。

server:
  port: 8080

spring:
  application:
    name: tps-backend

  datasource:
    url: ${TPS_DB_URL:jdbc:mysql://localhost:3306/tps?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${TPS_DB_USERNAME:root}
    password: ${TPS_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: ${TPS_REDIS_HOST:localhost}
      port: ${TPS_REDIS_PORT:6379}
      timeout: 3000ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  mvc:
    static-path-pattern: /img/**

  web:
    resources:
      static-locations: file:${TPS_UPLOAD_DIR:./img}/

jwt:
  secret: ${TPS_JWT_SECRET:tps-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
  expiration: ${TPS_JWT_EXPIRATION:86400000}
  refresh-expiration: ${TPS_JWT_REFRESH_EXPIRATION:604800000}

file:
  upload-dir: ${TPS_UPLOAD_DIR:./img}

app:
  public-base-url: ${TPS_PUBLIC_BASE_URL:}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.tps: DEBUG
