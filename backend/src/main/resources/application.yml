# 配置说明：后端公共配置文件，负责数据库、JWT、文件上传和接口文档等基础参数。

server:
  port: 8080

spring:
  application:
    name: tps-backend

  datasource:
    url: ${TPS_DB_URL:jdbc:mysql://localhost:3306/tps?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${TPS_DB_USERNAME:root}
    password: ${TPS_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: ${TPS_REDIS_HOST:localhost}
      port: ${TPS_REDIS_PORT:6379}
      timeout: 3000ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  mvc:
    static-path-pattern: /img/**

  web:
    resources:
      static-locations: file:${TPS_UPLOAD_DIR:./img}/

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

jwt:
  secret: ${TPS_JWT_SECRET:tps-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
  expiration: ${TPS_JWT_EXPIRATION:86400000}
  refresh-expiration: ${TPS_JWT_REFRESH_EXPIRATION:604800000}

file:
  upload-dir: ${TPS_UPLOAD_DIR:./img}

app:
  public-base-url: ${TPS_PUBLIC_BASE_URL:}
  rate-limit:
    enabled: ${TPS_RATE_LIMIT_ENABLED:true}
    auth:
      max-requests: ${TPS_AUTH_RATE_LIMIT_MAX:20}
      window-seconds: ${TPS_AUTH_RATE_LIMIT_WINDOW_SECONDS:300}
    upload:
      max-requests: ${TPS_UPLOAD_RATE_LIMIT_MAX:10}
      window-seconds: ${TPS_UPLOAD_RATE_LIMIT_WINDOW_SECONDS:600}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "requestId:%X{requestId} %5p"
  level:
    com.tps: DEBUG
