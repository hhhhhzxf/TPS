spring:
  datasource:
    url: jdbc:h2:mem:tps_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000
  refresh-expiration: 604800000

file:
  upload-dir: /tmp/tps-test-img

app:
  public-base-url: http://localhost

logging:
  level:
    com.tps: WARN
